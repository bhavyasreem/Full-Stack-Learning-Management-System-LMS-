<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Assignments | Aegis LMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="page-assignments">
    <!-- Navigation Bar -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"></path><path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v-5"></path></svg>
            Aegis LMS
        </a>
        <button class="mobile-nav-toggle" id="nav-toggle">☰</button>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="courses.html">Courses</a></li>
            <li><a href="dashboard.html" class="student-only">Dashboard</a></li>
            <li><a href="enrollments.html" class="student-only">Enrollments</a></li>
            <li><a href="assignments.html" class="student-only active">Assignments</a></li>
            <li><a href="admin.html" class="admin-only">Admin Control</a></li>
        </ul>
        <div class="nav-buttons" id="auth-buttons">
            <!-- Populated dynamically -->
        </div>
    </nav>

    <!-- Main Layout -->
    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="dashboard.html" class="sidebar-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>
                Overview
            </a>
            <a href="enrollments.html" class="sidebar-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                My Courses
            </a>
            <a href="assignments.html" class="sidebar-link active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Assignments
            </a>
        </aside>

        <!-- Content Area -->
        <main class="dashboard-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px;">
                <h2 style="font-size: 28px; font-weight: 700;">My Assignments</h2>
                <button class="btn btn-primary" id="new-submission-btn">+ Submit Assignment</button>
            </div>

            <!-- Assignments Table -->
            <div class="glass-panel" style="padding: 24px;">
                <div class="table-container">
                    <table class="custom-table" id="assignments-table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Course</th>
                                <th>Assignment Title</th>
                                <th>Submission Date</th>
                                <th>Marks Obtained</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="assignments-list">
                            <!-- Loaded dynamically -->
                            <tr>
                                <td colspan="6" style="text-align: center; color: var(--text-secondary);">Loading assignments...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Submit Assignment Modal -->
    <div class="modal" id="submit-modal">
        <div class="modal-content glass-panel" style="max-width: 500px;">
            <span class="close-btn" id="close-submit-modal">&times;</span>
            <h3 style="font-size: 22px; font-weight: 700; margin-bottom: 20px; color: var(--accent-blue);">Submit Assignment</h3>
            <form id="submit-assignment-form">
                <div class="form-group">
                    <label for="submit-course">Course Name</label>
                    <select id="submit-course" class="form-control" required style="background: var(--bg-secondary);">
                        <!-- Loaded dynamically based on active enrollments -->
                    </select>
                </div>
                <div class="form-group">
                    <label for="submit-title">Assignment Title</label>
                    <input type="text" id="submit-title" class="form-control" placeholder="e.g. Student Management System" required>
                </div>
                <div class="form-group">
                    <label for="submit-date">Submission Date</label>
                    <input type="date" id="submit-date" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Submit Task</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
